<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Орфографический тренажёр · 6 класс</title>
<style>
  :root{
    --pp:#E8833A;   /* пре/при */
    --po:#14857B;   /* пол/полу */
    --kk:#3B7DD8;   /* кас/кос */
    --ink:#23303a;
    --paper:#fbfaf6;
    --card:#ffffff;
    --line:#e7e3d8;
    --ok:#2E9E5B;
    --bad:#d9534f;
    --muted:#6b7682;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Segoe UI",-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--paper);color:var(--ink);
    padding:26px 20px 34px;display:flex;justify-content:center;
  }
  .wrap{width:100%;max-width:760px;}
  h1{font-size:24px;margin:0 0 4px;letter-spacing:.2px;}
  .sub{color:var(--muted);font-size:14px;margin:0 0 18px;}

  .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .tab{
    border:1.5px solid var(--line);background:#fff;border-radius:999px;
    padding:8px 16px;font-size:13.5px;font-weight:600;cursor:pointer;color:#46525c;
    transition:.15s;font-family:inherit;
  }
  .tab:hover{transform:translateY(-1px);}
  .tab.active{color:#fff;border-color:transparent;}
  .tab.active[data-f="all"]{background:var(--ink);}
  .tab.active[data-f="pp"]{background:var(--pp);}
  .tab.active[data-f="po"]{background:var(--po);}
  .tab.active[data-f="kk"]{background:var(--kk);}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px 24px 24px;box-shadow:0 6px 20px rgba(40,50,60,.05);
  }
  .topline{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
  .progress{font-size:13px;color:var(--muted);font-weight:600;}
  .score{font-size:13px;color:var(--muted);font-weight:600;}
  .score b{color:var(--ok);}

  .rule{
    font-size:13px;line-height:1.6;color:#55616b;background:#f6f4ec;
    border-left:3px solid var(--line);border-radius:8px;padding:10px 14px;margin:10px 0 18px;
  }
  .rule b{color:var(--ink);}

  .wordbox{display:flex;justify-content:center;align-items:center;min-height:96px;margin:6px 0 8px;}
  .word{font-size:clamp(24px,4.8vw,37px);font-weight:600;line-height:1.35;letter-spacing:.2px;text-align:center;}
  .gap{
    display:inline-block;min-width:34px;margin:0 2px;text-align:center;color:var(--muted);
    border-bottom:3px dashed #c9cdd3;line-height:1;
  }
  .ins{font-weight:700;color:var(--ok);}
  .meaning{display:block;font-size:15px;color:var(--muted);font-weight:500;margin-top:8px;}

  .options{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
  .opt{
    border:2px solid var(--line);background:#fff;border-radius:14px;
    padding:12px 24px;font-size:16px;font-weight:700;cursor:pointer;color:#3b454e;
    transition:.13s;font-family:inherit;min-width:92px;
  }
  .opt:hover:not(:disabled){transform:translateY(-1px);border-color:#cfd5db;}
  .opt:disabled{cursor:default;}
  .opt.chosen-ok{border-color:var(--ok);background:#e6f4ec;color:var(--ok);}
  .opt.chosen-bad{border-color:var(--bad);background:#fbe9e8;color:var(--bad);}
  .opt.reveal{border-color:var(--ok);color:var(--ok);}

  .feedback{margin-top:16px;min-height:20px;text-align:center;}
  .fmsg{font-size:15px;font-weight:700;margin-bottom:6px;}
  .fmsg.ok{color:var(--ok);}
  .fmsg.bad{color:var(--bad);}
  .why{font-size:14px;color:#55616b;line-height:1.55;max-width:560px;margin:0 auto;}
  .badge{display:inline-block;font-size:11.5px;font-weight:700;color:#9a6b00;background:#fdf0d2;
    border:1px solid #f0d79a;border-radius:999px;padding:2px 10px;margin-bottom:8px;letter-spacing:.3px;}

  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:22px;gap:10px;}
  .btn{border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
  .btn-nav{background:#fff;border:1.5px solid var(--line);color:#56606a;}
  .btn-nav:hover:not(:disabled){border-color:#cfd5db;}
  .btn-nav:disabled{opacity:.4;cursor:default;}
  .btn-ghost{background:#f0eee6;color:#56606a;}
  .btn-ghost:hover{background:#e7e4da;}
  .midbtns{display:flex;gap:8px;}

  /* шкала выполнения */
  .results{background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:18px 22px 20px;margin-top:18px;box-shadow:0 6px 20px rgba(40,50,60,.05);}
  .restitle{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--ink);}
  .resrow{margin-bottom:14px;}
  .resrow:last-child{margin-bottom:0;}
  .reshead{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px;color:#55616b;}
  .reshead .pct{color:var(--ink);}
  .track{height:11px;border-radius:999px;background:#efece3;overflow:hidden;}
  .fill{height:100%;border-radius:999px;transition:width .4s ease;}
  .resrow.total{border-top:1px solid var(--line);padding-top:14px;margin-top:4px;}
  .resrow.total .reshead{font-size:14px;font-weight:700;color:var(--ink);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Орфографический тренажёр</h1>
  <p class="sub">6 класс · приставки ПРЕ/ПРИ · ПОЛ/ПОЛУ · чередующийся корень КАС/КОС</p>

  <div class="tabs" id="tabs">
    <button class="tab active" data-f="all">Все</button>
    <button class="tab" data-f="pp">ПРЕ / ПРИ</button>
    <button class="tab" data-f="po">ПОЛ / ПОЛУ</button>
    <button class="tab" data-f="kk">КАС / КОС</button>
  </div>

  <div class="card">
    <div class="topline">
      <span class="progress" id="progress"></span>
      <span class="score">Верно: <b id="score">0</b> из <span id="total"></span></span>
    </div>

    <div class="rule" id="rule"></div>

    <div class="wordbox"><div class="word" id="word"></div></div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback"></div>

    <div class="navrow">
      <button class="btn btn-nav" id="prev">← Назад</button>
      <div class="midbtns">
        <button class="btn btn-ghost" id="retry">Ещё раз</button>
        <button class="btn btn-ghost" id="shuffle">Перемешать</button>
      </div>
      <button class="btn btn-nav" id="next">Далее →</button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="restitle">Выполнение</div>
    <div id="resbars"></div>
  </div>
</div>

<script>

const REMIND = {
  pp:"<b>ПРИ-</b>: приближение, присоединение, близость, неполнота действия. &nbsp;<b>ПРЕ-</b>: значение «очень» или равно приставке ПЕРЕ-. &nbsp;Часть слов — словарные, их пишут по памяти.",
  po:"<b>ПОЛ-</b> + гласная, буква Л или заглавная буква → через дефис. &nbsp;<b>ПОЛ-</b> + согласная → слитно. &nbsp;<b>ПОЛУ-</b> → всегда слитно. &nbsp;Если между ПОЛ и словом есть определение → <b>раздельно</b>, в три слова.",
  kk:"После корня есть суффикс <b>-А-</b> → пишем <b>КАС-</b>. &nbsp;Суффикса -А- нет → пишем <b>КОС-</b>."
};

const $ = id => document.getElementById(id);
const state = ITEMS.map(()=>({chosen:null, correct:false}));
const CATS = [["pp","ПРЕ / ПРИ","var(--pp)"],["po","ПОЛ / ПОЛУ","var(--po)"],["kk","КАС / КОС","var(--kk)"]];
let filter = "all";
let list = [];
let pos = 0;

function buildList(){
  list = ITEMS.map((_,i)=>i).filter(i => filter==="all" || ITEMS[i].cat===filter);
  pos = 0;
}
function fullWord(it,i){ return it.left + it.vals[i] + it.right; }

function render(){
  const ref = list[pos], it = ITEMS[ref], st = state[ref];
  $("rule").innerHTML = REMIND[it.cat];
  $("progress").textContent = "Задание " + (pos+1) + " из " + list.length;
  $("total").textContent = list.length;
  $("score").textContent = list.filter(i=>state[i].correct).length;

  const word = $("word");
  const meaning = it.meaning ? `<span class="meaning">${it.meaning}</span>` : "";
  if(st.chosen===null){
    word.innerHTML = `${it.left}<span class="gap">?</span>${it.right}${meaning}`;
  }else{
    word.innerHTML = `${it.left}<span class="ins">${it.vals[it.ans]}</span>${it.right}${meaning}`;
  }

  const opts = $("options");
  opts.innerHTML = "";
  it.opts.forEach((label,i)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = label;
    if(st.chosen===null){ b.onclick = ()=>answer(i); }
    else{
      b.disabled = true;
      if(i===it.ans) b.classList.add(st.chosen===i ? "chosen-ok" : "reveal");
      else if(i===st.chosen) b.classList.add("chosen-bad");
    }
    opts.appendChild(b);
  });

  const fb = $("feedback");
  if(st.chosen===null){ fb.innerHTML = ""; }
  else{
    const badge = it.dict ? `<div class="badge">СЛОВАРНОЕ СЛОВО</div>` : "";
    if(st.correct){
      fb.innerHTML = `${badge}<div class="fmsg ok">Верно! ✓</div><div class="why">${it.why}</div>`;
    }else{
      const wrong = fullWord(it, st.chosen).replace(/\s+/g," ").trim();
      fb.innerHTML = `${badge}<div class="fmsg bad">Не совсем — вы выбрали «${wrong}».</div><div class="why">${it.why}</div>`;
    }
  }

  $("retry").style.visibility = st.chosen===null ? "hidden" : "visible";
  $("prev").disabled = pos===0;
  $("next").disabled = pos===list.length-1;
  updateResults();
}

function updateResults(){
  let html = ""; let totDone=0, totAll=0;
  CATS.forEach(([c,name,col])=>{
    const idxs = ITEMS.map((it,i)=>it.cat===c?i:-1).filter(i=>i>=0);
    const done = idxs.filter(i=>state[i].correct).length;
    const all = idxs.length;
    totDone += done; totAll += all;
    const pct = all ? Math.round(done/all*100) : 0;
    html += `<div class="resrow"><div class="reshead"><span>${name}</span><span class="pct">${pct}% · ${done} из ${all}</span></div>
      <div class="track"><div class="fill" style="width:${pct}%;background:${col}"></div></div></div>`;
  });
  const tpct = totAll ? Math.round(totDone/totAll*100) : 0;
  html += `<div class="resrow total"><div class="reshead"><span>Итого</span><span class="pct">${tpct}% · ${totDone} из ${totAll}</span></div>
    <div class="track"><div class="fill" style="width:${tpct}%;background:var(--ink)"></div></div></div>`;
  $("resbars").innerHTML = html;
}

function answer(i){
  const ref = list[pos], it = ITEMS[ref], st = state[ref];
  st.chosen = i; st.correct = (i===it.ans);
  render();
}
function retry(){ const ref=list[pos]; state[ref].chosen=null; state[ref].correct=false; render(); }
function go(d){ pos=Math.max(0,Math.min(list.length-1,pos+d)); render(); }
function shuffle(){ for(let i=list.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [list[i],list[j]]=[list[j],list[i]]; } pos=0; render(); }

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    filter = t.dataset.f;
    buildList(); render();
  };
});
$("prev").onclick=()=>go(-1);
$("next").onclick=()=>go(1);
$("retry").onclick=retry;
$("shuffle").onclick=shuffle;

buildList(); render();
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задание 9. Правописание корней</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#041E2E; --bg2:#083A52; --bg3:#0B5170;
    --panel:rgba(255,255,255,.06);
    --panel-solid:#0E3C52;
    --line:rgba(255,255,255,.14);
    --text:#EAF6FB;
    --text-dim:#9FC6D6;
    --aqua:#4FD1C5;
    --coral:#FF8A65;
    --green:#3DDC97; --green-soft:rgba(61,220,151,.15);
    --red:#FF6F61; --red-soft:rgba(255,111,97,.15);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(ellipse 70% 50% at 20% 0%, rgba(79,209,197,.16) 0%, transparent 55%),
      radial-gradient(ellipse 60% 45% at 85% 15%, rgba(11,81,112,.5) 0%, transparent 60%),
      linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
    color:var(--text);
    font-family:'PT Sans',sans-serif;
    display:flex;flex-direction:column;
    overflow:hidden;
    position:relative;
  }

  /* лучи света сверху */
  .light-rays{position:fixed;top:0;left:0;right:0;height:100%;z-index:0;pointer-events:none;overflow:hidden;}
  .light-rays span{
    position:absolute;top:-15%;width:120px;height:130%;
    background:linear-gradient(180deg, rgba(120,225,215,.10), transparent 70%);
    transform:skewX(-12deg);filter:blur(6px);
    animation:rayGlow 7s ease-in-out infinite;
  }
  .light-rays span:nth-child(1){left:12%;animation-delay:0s;}
  .light-rays span:nth-child(2){left:34%;width:80px;animation-delay:1.6s;}
  .light-rays span:nth-child(3){left:62%;width:150px;animation-delay:.8s;}
  .light-rays span:nth-child(4){left:82%;width:90px;animation-delay:2.4s;}
  @keyframes rayGlow{0%,100%{opacity:.25;}50%{opacity:.55;}}

  /* пузырьки */
  .bubbles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .bubbles i{
    position:absolute;bottom:-40px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.5), rgba(120,225,215,.08) 60%, transparent 70%);
    border:1px solid rgba(255,255,255,.12);
    animation:bubbleRise linear infinite;
  }
  @keyframes bubbleRise{
    0%{transform:translateY(0) translateX(0);opacity:0;}
    10%{opacity:.7;}
    90%{opacity:.5;}
    100%{transform:translateY(-105vh) translateX(30px);opacity:0;}
  }

  /* многослойные волны снизу */
  .bg-wave{position:fixed;left:0;right:0;bottom:0;width:100%;height:180px;z-index:0;pointer-events:none;}
  .bg-wave.w1{opacity:.30;height:200px;}
  .bg-wave.w2{opacity:.20;height:150px;}
  .bg-wave.w3{opacity:.12;height:110px;}
  .bg-wave.w1 path{animation:waveDrift 11s linear infinite;}
  .bg-wave.w2 path{animation:waveDrift 8s linear infinite reverse;}
  .bg-wave.w3 path{animation:waveDrift 14s linear infinite;}
  @keyframes waveDrift{from{transform:translateX(0);}to{transform:translateX(-300px);}}

  /* блик на поверхности сверху */
  .surface-shimmer{position:fixed;top:0;left:0;right:0;height:70px;z-index:0;pointer-events:none;
    background:linear-gradient(180deg, rgba(160,235,225,.12), transparent);}

  .progressbar{height:5px;background:rgba(255,255,255,.08);flex-shrink:0;position:relative;z-index:2;
    background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 18px, transparent 18px 22px);}
  .progressbar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--aqua),#7be0d4);transition:width .4s ease;
    box-shadow:0 0 12px rgba(79,209,197,.7);}

  .slide-viewport{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;
    padding:40px 24px 24px 24px;position:relative;z-index:1;}
  .slide{width:100%;max-width:900px;animation:slideSurface .5s cubic-bezier(.22,1,.36,1);}
  @keyframes slideSurface{
    0%{opacity:0;transform:translateY(26px) scale(.97);filter:blur(5px);}
    60%{filter:blur(0);}
    100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* декоративная волна-рябь при переходе между слайдами */
  .transition-ripple{position:fixed;top:50%;left:50%;width:16px;height:16px;border-radius:50%;
    border:2px solid rgba(79,209,197,.55);transform:translate(-50%,-50%) scale(0);opacity:0;
    pointer-events:none;z-index:40;}
  .transition-ripple.play{animation:bigRipple .65s cubic-bezier(.22,1,.36,1);}
  @keyframes bigRipple{
    0%{transform:translate(-50%,-50%) scale(0);opacity:.7;}
    100%{transform:translate(-50%,-50%) scale(70);opacity:0;}
  }

  /* всплеск-капли при выборе буквы */
  .droplet{position:fixed;width:6px;height:6px;border-radius:50% 50% 50% 0;
    transform:translate(-50%,-50%) rotate(45deg);pointer-events:none;z-index:50;
    animation:dropletFly .55s ease-out forwards;}
  @keyframes dropletFly{
    to{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(45deg) scale(.25);opacity:0;}
  }

  /* волновая рябь при клике по кнопке */
  .ripple-circle{position:absolute;border-radius:50%;background:rgba(255,255,255,.45);
    transform:scale(0);opacity:1;pointer-events:none;animation:rippleAnim .55s ease-out forwards;}
  @keyframes rippleAnim{to{transform:scale(2.6);opacity:0;}}

  /* тактильная реакция на нажатие */
  button, .chip, .ege-row, .sort-bucket, .sort-chip{transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;}
  button:active, .chip:active, .ege-row:active, .sort-bucket:active, .sort-chip:active{transform:scale(.94);}

  @keyframes chipPop{0%{transform:scale(1);}45%{transform:scale(1.16);}100%{transform:scale(1);}}
  @keyframes cardShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
  @keyframes cardGlow{0%{box-shadow:0 0 0 rgba(61,220,151,0);}40%{box-shadow:0 0 22px rgba(61,220,151,.55);}100%{box-shadow:0 0 0 rgba(61,220,151,0);}}

  .eyebrow{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--aqua);font-weight:700;
    margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .eyebrow::before{content:"〜";color:var(--coral);font-weight:700;}
  h1{font-family:'PT Serif',serif;font-size:34px;margin:0 0 10px 0;line-height:1.2;
    text-shadow:0 2px 20px rgba(11,81,112,.6);}
  h2{font-family:'PT Serif',serif;font-size:24px;margin:0 0 4px 0;}
  .subtitle{color:var(--text-dim);font-size:15.5px;max-width:660px;line-height:1.55;}

  .title-slide{min-height:58vh;display:flex;flex-direction:column;justify-content:center;}
  .title-slide h1{font-size:46px;}
  .agenda{margin-top:26px;display:grid;gap:8px;}
  .agenda-item{display:flex;gap:12px;align-items:baseline;color:var(--text-dim);font-size:14.5px;
    border-bottom:1px solid var(--line);padding-bottom:8px;}
  .agenda-item b{color:var(--aqua);font-family:'PT Serif',serif;min-width:24px;}

  .rule-block{background:linear-gradient(160deg, rgba(255,255,255,.09), rgba(255,255,255,.03));
    border:1px solid var(--line);border-left:3px solid var(--aqua);
    border-radius:12px;padding:16px 20px;margin-bottom:14px;backdrop-filter:blur(6px);
    box-shadow:0 8px 24px rgba(2,20,30,.35), inset 0 1px 0 rgba(255,255,255,.08);}
  .rule-block h3{font-family:'PT Serif',serif;font-size:17px;margin:0 0 6px 0;color:var(--aqua);
    text-shadow:0 0 14px rgba(79,209,197,.4);}
  .rule-block p{margin:6px 0;line-height:1.55;font-size:14.5px;color:var(--text);}
  .rule-block .ex{color:var(--text-dim);font-style:italic;}
  .trap-box{background:rgba(255,138,101,.08);border:1px dashed rgba(255,138,101,.4);border-radius:10px;
    padding:14px 18px;margin-top:16px;font-size:13.5px;color:var(--text-dim);}
  .trap-box b{color:var(--coral);}

  .practice-instruction{color:var(--text-dim);font-size:14.5px;margin-bottom:16px;}
  .word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;margin-bottom:16px;}
  .word-card{background:linear-gradient(160deg, rgba(255,255,255,.08), rgba(255,255,255,.025));
    border:1px solid var(--line);border-radius:11px;padding:9px 11px;backdrop-filter:blur(4px);
    box-shadow:0 4px 14px rgba(2,20,30,.28), inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .15s, box-shadow .15s;}
  .word-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(2,20,30,.4), inset 0 1px 0 rgba(255,255,255,.08);}
  .word-card .word-text{font-family:'PT Serif',serif;font-size:15.5px;margin-bottom:8px;}
  .word-text .blank{display:inline-block;min-width:26px;border-bottom:2px solid var(--text-dim);
    text-align:center;color:var(--coral);font-weight:700;}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{border:1px solid var(--text-dim);background:transparent;color:var(--text);border-radius:20px;
    padding:4px 12px;font-size:13px;cursor:pointer;font-family:'PT Sans',sans-serif;}
  .chip:hover{border-color:var(--aqua);}
  .chip.selected{background:var(--aqua);color:#052C3F;border-color:var(--aqua);animation:chipPop .35s ease;}
  .word-card.correct{border-color:var(--green);background:var(--green-soft);animation:cardGlow .7s ease;}
  .word-card.wrong{border-color:var(--red);background:var(--red-soft);animation:cardShake .4s ease;}
  .word-card.locked .chip{cursor:default;opacity:.55;}
  .word-card.locked .chip.selected{opacity:1;}
  .answer-reveal{font-size:11.5px;color:var(--coral);margin-top:6px;display:none;}
  .word-card.wrong .answer-reveal{display:block;}

  .prompt-card{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:14px 16px;margin-bottom:10px;}
  .prompt-card p{margin:0 0 10px 0;font-size:14.5px;color:var(--text-dim);}
  .prompt-card .chip{font-size:14px;padding:6px 16px;}

  .practice-footer{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:10px;}
  .btn{font-family:'PT Sans',sans-serif;font-weight:700;border:none;border-radius:24px;padding:10px 22px;
    cursor:pointer;font-size:14px;}
  .btn-primary{background:var(--aqua);color:#052C3F;}
  .btn-primary:hover{background:#6be0d4;}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn-ghost:hover{border-color:var(--aqua);color:var(--aqua);}
  .btn:disabled{opacity:.35;cursor:default;}
  .practice-result{font-family:'PT Serif',serif;font-size:15px;color:var(--text);}

  /* SORT */
  .sort-pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;padding:14px;background:var(--panel);
    border:1px solid var(--line);border-radius:10px;min-height:50px;}
  .sort-chip{border:1px solid var(--aqua);background:rgba(79,209,197,.12);color:var(--text);
    border-radius:20px;padding:6px 14px;font-size:13.5px;cursor:pointer;font-family:'PT Serif',serif;}
  .sort-chip.selecting{background:var(--aqua);color:#052C3F;}
  .sort-chip.placed{cursor:pointer;}
  .sort-chip.correct{border-color:var(--green);background:var(--green-soft);color:var(--text);animation:cardGlow .7s ease;}
  .sort-chip.wrong{border-color:var(--red);background:var(--red-soft);color:var(--text);animation:cardShake .4s ease;}
  .sort-buckets{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
  .sort-bucket{background:rgba(255,255,255,.03);border:1px dashed var(--line);border-radius:10px;
    padding:10px;min-height:90px;}
  .sort-bucket-title{font-family:'PT Serif',serif;color:var(--coral);font-size:13px;margin-bottom:8px;text-align:center;}
  .sort-bucket .sort-chip-row{display:flex;flex-wrap:wrap;gap:6px;}

  /* FLASHCARDS */
  .flash-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .flash-card{width:100%;max-width:420px;height:180px;perspective:1000px;cursor:pointer;}
  .flash-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
  .flash-inner.flipped{transform:rotateY(180deg);}
  .flash-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;
    border:1px solid var(--line);font-family:'PT Serif',serif;font-size:22px;}
  .flash-front{background:var(--panel);color:var(--text);}
  .flash-back{background:rgba(79,209,197,.12);color:var(--aqua);transform:rotateY(180deg);flex-direction:column;gap:6px;}
  .flash-back .tag{font-family:'PT Sans',sans-serif;font-size:12px;color:var(--coral);text-transform:uppercase;letter-spacing:.05em;}
  .flash-controls{display:flex;align-items:center;gap:14px;}
  .flash-counter{color:var(--text-dim);font-size:13px;min-width:60px;text-align:center;}
  .flash-rate{display:flex;gap:10px;margin-top:6px;}
  .flash-rate button{font-family:'PT Sans',sans-serif;font-weight:700;border-radius:20px;padding:8px 18px;
    font-size:13px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--text);}
  .flash-rate .know{border-color:var(--green);color:var(--green);}
  .flash-rate .review{border-color:var(--coral);color:var(--coral);}
  .flash-summary{color:var(--text-dim);font-size:13.5px;margin-top:8px;}

  /* QUIZ */
  .quiz-progress{color:var(--text-dim);font-size:13px;margin-bottom:10px;}
  .quiz-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px;max-width:560px;}
  .quiz-card p.q-prompt{font-family:'PT Serif',serif;font-size:18px;margin:0 0 18px 0;color:var(--text);}
  .quiz-options{display:flex;flex-direction:column;gap:10px;}
  .quiz-option{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:10px;
    padding:12px 16px;font-size:15px;text-align:left;cursor:pointer;font-family:'PT Sans',sans-serif;}
  .quiz-option:hover{border-color:var(--aqua);}
  .quiz-option.correct{border-color:var(--green);background:var(--green-soft);animation:cardGlow .7s ease;}
  .quiz-option.wrong{border-color:var(--red);background:var(--red-soft);animation:cardShake .4s ease;}
  .quiz-option:disabled{cursor:default;}
  .quiz-next{margin-top:16px;}
  .quiz-final{font-family:'PT Serif',serif;font-size:20px;color:var(--aqua);}

  /* EGE ROWS */
  .ege-row{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:12px 16px;
    margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:baseline;}
  .ege-row:hover{border-color:var(--aqua);}
  .ege-row.selected{border-color:var(--aqua);background:rgba(79,209,197,.1);}
  .ege-row.correct{border-color:var(--green);background:var(--green-soft);animation:cardGlow .7s ease;}
  .ege-row.wrong{border-color:var(--red);background:var(--red-soft);animation:cardShake .4s ease;}
  .ege-row-num{font-family:'PT Serif',serif;color:var(--coral);font-weight:700;min-width:20px;}
  .ege-row-words{font-family:'PT Serif',serif;font-size:15.5px;}
  .ege-row .blank{color:var(--text-dim);font-weight:700;}
  .ege-block.locked .ege-row{cursor:default;}

  .navbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;
    border-top:1px solid var(--line);background:var(--panel-solid);position:relative;z-index:2;}
  .navbar button{font-family:'PT Sans',sans-serif;font-weight:700;background:transparent;
    border:1px solid var(--line);color:var(--text);border-radius:20px;padding:9px 20px;cursor:pointer;font-size:14px;}
  .navbar button:hover:not(:disabled){border-color:var(--aqua);color:var(--aqua);}
  .navbar button:disabled{opacity:.3;cursor:default;}
  .slide-counter{color:var(--text-dim);font-size:13px;}

  .gauges{display:flex;gap:32px;flex-wrap:wrap;margin:24px 0;}
  .gauge{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .gauge svg{width:150px;height:150px;}
  .gauge .gauge-label{font-size:12.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;}
  .homework{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--coral);
    border-radius:10px;padding:18px 22px;margin-top:20px;}
  .homework h3{font-family:'PT Serif',serif;color:var(--coral);margin:0 0 10px 0;font-size:18px;}
  .homework ul{margin:0;padding-left:20px;line-height:1.7;font-size:14.5px;}
  .homework .weak{color:var(--coral);}
  .homework .static-note{color:var(--text-dim);margin-top:10px;font-size:13px;}

  /* ВИДЕО-ВСТУПЛЕНИЕ */
  .video-intro-wrap{position:fixed;inset:0;z-index:10;background:#041E2E;overflow:hidden;}
  .video-intro-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
  .video-intro-mask{position:absolute;left:0;right:0;bottom:0;top:34%;pointer-events:none;
    backdrop-filter:blur(26px) saturate(115%);-webkit-backdrop-filter:blur(26px) saturate(115%);
    background:linear-gradient(180deg, rgba(4,30,46,0) 0%, rgba(4,30,46,.45) 22%, rgba(4,30,46,.82) 70%, rgba(4,30,46,.92) 100%);}
  .video-intro-text{position:absolute;left:0;right:50%;margin-right:-50%;top:60%;width:100vw;text-align:center;
    pointer-events:none;}
  .video-intro-line{position:absolute;left:50%;top:0;transform:translate(-50%,-50%);width:92vw;
    font-family:'PT Serif',serif;color:var(--text);font-weight:700;
    font-size:clamp(24px,4.2vw,46px);opacity:0;text-shadow:0 0 26px rgba(79,209,197,.65);}
  .video-intro-line::after{content:"";display:block;width:70px;height:2px;background:var(--aqua);
    margin:16px auto 0;box-shadow:0 0 14px var(--aqua);}
  .video-intro-line.l1{animation:introLine1 6.9s ease forwards;}
  .video-intro-line.l2{animation:introLine2 6.9s ease forwards;}
  @keyframes introLine1{0%{opacity:0;transform:translate(-50%,-40%);}14%{opacity:1;transform:translate(-50%,-50%);}46%{opacity:1;}58%{opacity:0;}100%{opacity:0;}}
  @keyframes introLine2{0%{opacity:0;}60%{opacity:0;transform:translate(-50%,-40%);}75%{opacity:1;transform:translate(-50%,-50%);}100%{opacity:1;}}
  .video-intro-skip{position:absolute;bottom:22px;right:22px;z-index:11;
    background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--text);
    border-radius:20px;padding:9px 18px;font-family:'PT Sans',sans-serif;font-weight:700;
    font-size:13px;cursor:pointer;}
  .video-intro-skip:hover{border-color:var(--aqua);color:var(--aqua);}

  @media (max-width:560px){
    h1{font-size:26px;} .title-slide h1{font-size:30px;} .gauges{justify-content:center;}
  }
</style>
</head>
<body>
  <div class="surface-shimmer"></div>
  <div class="light-rays"><span></span><span></span><span></span><span></span></div>
  <div class="bubbles" id="bubbles"></div>
  <svg class="bg-wave w3" viewBox="0 0 300 40" preserveAspectRatio="none">
    <path d="M0,22 Q37.5,10 75,22 T150,22 T225,22 T300,22 T375,22 T450,22 T525,22 T600,22 V40 H0 Z" fill="#7be0d4"></path>
  </svg>
  <svg class="bg-wave w2" viewBox="0 0 300 40" preserveAspectRatio="none">
    <path d="M0,20 Q37.5,6 75,20 T150,20 T225,20 T300,20 T375,20 T450,20 T525,20 T600,20 V40 H0 Z" fill="#4FD1C5"></path>
  </svg>
  <svg class="bg-wave w1" viewBox="0 0 300 40" preserveAspectRatio="none">
    <path d="M0,24 Q37.5,12 75,24 T150,24 T225,24 T300,24 T375,24 T450,24 T525,24 T600,24 V40 H0 Z" fill="#0B5170"></path>
  </svg>
  <div class="transition-ripple" id="transitionRipple"></div>
  <div class="progressbar"><div class="progressbar-fill" id="progressFill"></div></div>
  <div class="slide-viewport" id="slideViewport"></div>
  <div class="navbar">
    <button id="prevBtn">← Назад</button>
    <div class="slide-counter" id="slideCounter"></div>
    <button id="nextBtn">Далее →</button>
  </div>

<script>
/* ============================= БАНКИ СЛОВ ============================= */

const P_UDARENIE = [
  {before:"заг",after:"р",options:["а","о"],answer:"а"},
  {before:"заг",after:"релый",options:["а","о"],answer:"о"},
  {before:"уг",after:"р",options:["а","о"],answer:"а"},
  {before:"приг",after:"рать",options:["а","о"],answer:"о"},
  {before:"заг",after:"рать",options:["а","о"],answer:"о"},

        <p>2. <b>Проверяемые гласные, но «омонимичные» корни</b> — слово звучит одинаково с другим, но проверяется по-разному.</p>
        <p>3. <b>Гласные после шипящих</b> — в корне и в суффиксах разных частей речи.</p>
        <p>4. <b>Гласные И/Ы после Ц</b> — в корне, окончании и суффиксах.</p>

      <p class="subtitle">Дальше разберём каждую группу по очереди: правило → примеры → живая практика в разных форматах.</p>`;
  }

  else if(s.type === "rule"){

    let trapHtml = s.trap ? `<div class="trap-box"><b>Ловушка.</b> ${s.trap}</div>` : "";
    el.innerHTML = `<div class="eyebrow">${s.section}</div><h1>${s.title}</h1>${blocksHtml}${trapHtml}`;
  }

  else if(s.type === "practice"){

      <div class="word-grid" id="grid-${idx}"></div>
      <div class="practice-footer">
        <button class="btn btn-primary" id="check-${idx}">Проверить</button>
        <div class="practice-result" id="result-${idx}"></div>
      </div>`;
    renderLetterPractice(idx, s.items);
    document.getElementById("check-"+idx).addEventListener("click", ()=>checkLetterPractice(idx, s.items, s.section));

  }

  else if(s.type === "sort"){

      <div class="eyebrow">${s.section}</div><h1>${s.title}</h1>
      <p class="practice-instruction">${s.instruction}</p>
      <div class="sort-pool" id="pool-${idx}"></div>
      <div class="sort-buckets" id="buckets-${idx}"></div>
      <div class="practice-footer">
        <button class="btn btn-primary" id="check-${idx}">Проверить</button>
        <div class="practice-result" id="result-${idx}"></div>
      </div>`;
    renderSort(idx, s.data);
    document.getElementById("check-"+idx).addEventListener("click", ()=>checkSort(idx, s.data, s.section));
    return;
  }

  else if(s.type === "flashcard"){
    el.innerHTML = `
      <div class="eyebrow">${s.section}</div><h1>${s.title}</h1>
      <p class="practice-instruction">${s.instruction}</p>
      <div class="flash-wrap" id="flashwrap-${idx}"></div>`;
    renderFlashcards(idx, s.items, s.section);
    return;
  }

  else if(s.type === "quiz"){

      <div class="eyebrow">${s.section}</div><h1>${s.title}</h1>
      <p class="practice-instruction">${s.instruction}</p>
      <div id="quizwrap-${idx}"></div>`;

  else if(s.type === "egeIntro"){

      <p class="subtitle" style="margin-bottom:20px;">Дальше — десять заданий, устроенных точно так же, как настоящее задание 9 на экзамене: пять строк по три слова, и только в одной строке во всех словах пропущена одна и та же буква. Нужно найти эту строку.</p>
      <div class="rule-block">
        <h3>Как работать с заданием</h3>
        <p>Прочитайте все три слова в строке и мысленно подставьте букву — если для всех трёх подходит одна и та же, это и есть ответ. Строки специально перемешивают разные типы орфограмм, чтобы проверить, распознаёте ли вы тип чередования с первого взгляда.</p>
      </div>`;
  }

  else if(s.type === "egeRows"){

/* ============================= LETTER PRACTICE ============================= */

const letterState = {};

function renderLetterPractice(idx, items){
  letterState[idx] = {};
  const grid = document.getElementById("grid-"+idx);
  grid.innerHTML = "";
  items.forEach((it, i)=>{
    const card = document.createElement("div");
    card.className = "word-card";
    card.id = "card-"+idx+"-"+i;
    card.innerHTML = `
      <div class="word-text">${it.before}<span class="blank" id="blank-${idx}-${i}">___</span>${it.after}</div>
      <div class="chip-row">${it.options.map(o=>`<button class="chip" id="chip-${idx}-${i}-${o}">${o}</button>`).join("")}</div>
      <div class="answer-reveal" id="reveal-${idx}-${i}"></div>`;
    grid.appendChild(card);
    it.options.forEach(o=>{
      document.getElementById(`chip-${idx}-${i}-${o}`).addEventListener("click", (e)=>{
        if(card.classList.contains("locked")) return;
        letterState[idx][i] = o;
        it.options.forEach(o2=>document.getElementById(`chip-${idx}-${i}-${o2}`).classList.toggle("selected", o2===o));
        document.getElementById(`blank-${idx}-${i}`).textContent = o;
        dropletBurst(e.currentTarget);
      });
    });
  });
}

function checkLetterPractice(idx, items, section){
  let correct = 0;
  items.forEach((it,i)=>{
    const card = document.getElementById("card-"+idx+"-"+i);
    const chosen = letterState[idx][i];
    card.classList.add("locked");
    if(chosen === it.answer){
      correct++; card.classList.add("correct");
    } else {
      card.classList.add("wrong");
      document.getElementById(`reveal-${idx}-${i}`).textContent = "Правильно: " + it.answer + " (" + it.before + it.answer + it.after + ")";
      document.getElementById(`blank-${idx}-${i}`).textContent = chosen || "—";
    }
  });
  const percent = Math.round((correct/items.length)*100);
  document.getElementById("result-"+idx).textContent = correct+" / "+items.length+" — "+percent+"%";
  slideScores[idx] = {correct, total: items.length, section};
}

/* ============================= SORT ============================= */

const sortState = {};

function renderSort(idx, data){
  sortState[idx] = {assign:{}, selected:null};
  const pool = document.getElementById("pool-"+idx);
  const buckets = document.getElementById("buckets-"+idx);
  pool.innerHTML = "";
  buckets.innerHTML = "";
  data.items.forEach((it,i)=>{
    const chip = document.createElement("button");
    chip.className = "sort-chip";
    chip.textContent = (data.mode === "letter") ? (it.before + "…" + it.after) : it.word;
    chip.id = "sortchip-"+idx+"-"+i;
    chip.addEventListener("click", ()=>{
      if(buckets.classList.contains("locked")) return;
      document.querySelectorAll(`#pool-${idx} .sort-chip, #buckets-${idx} .sort-chip`).forEach(c=>c.classList.remove("selecting"));
      sortState[idx].selected = i;
      chip.classList.add("selecting");
    });
    pool.appendChild(chip);
  });
  data.buckets.forEach(bname=>{
    const b = document.createElement("div");
    b.className = "sort-bucket";
    b.innerHTML = `<div class="sort-bucket-title">${bname}</div><div class="sort-chip-row" id="bucketrow-${idx}-${bname.replace(/\s/g,'')}"></div>`;
    b.addEventListener("click", ()=>{
      const sel = sortState[idx].selected;
      if(sel === null || buckets.classList.contains("locked")) return;
      sortState[idx].assign[sel] = bname;
      const chip = document.getElementById("sortchip-"+idx+"-"+sel);
      chip.classList.remove("selecting");
      chip.classList.add("placed");
      document.getElementById(`bucketrow-${idx}-${bname.replace(/\s/g,'')}`).appendChild(chip);
      sortState[idx].selected = null;
    });
    buckets.appendChild(b);
  });
}

function checkSort(idx, data, section){
  const buckets = document.getElementById("buckets-"+idx);
  buckets.classList.add("locked");
  let correct = 0;
  data.items.forEach((it,i)=>{
    const chip = document.getElementById("sortchip-"+idx+"-"+i);
    const assigned = sortState[idx].assign[i];
    if(assigned === it.bucket){
      correct++; chip.classList.add("correct");
    } else {
      chip.classList.add("wrong");
      const revealWord = data.mode === "letter" ? (it.before + it.bucket.toLowerCase() + it.after) : "";
      chip.title = data.mode === "letter" ? ("Верно: " + it.bucket + " (" + revealWord + ")") : ("Верно: " + it.bucket);
    }
  });
  const percent = Math.round((correct/data.items.length)*100);
  document.getElementById("result-"+idx).textContent = correct+" / "+data.items.length+" — "+percent+"%";
  slideScores[idx] = {correct, total: data.items.length, section};
}

/* ============================= FLASHCARDS ============================= */

const flashState = {};

function renderFlashcards(idx, items, section){
  flashState[idx] = {pos:0, ratings:{}};
  drawFlashcard(idx, items, section);
}

function drawFlashcard(idx, items, section){
  const st = flashState[idx];
  const wrap = document.getElementById("flashwrap-"+idx);
  const it = items[st.pos];
  const knownCount = Object.values(st.ratings).filter(r=>r==="know").length;
  const ratedCount = Object.keys(st.ratings).length;
  wrap.innerHTML = `
    <div class="flash-card" id="flashcard-${idx}">
      <div class="flash-inner" id="flashinner-${idx}">
        <div class="flash-face flash-front">${it.before}<span class="blank">___</span>${it.after}</div>
        <div class="flash-face flash-back">
          <div>${it.before}${it.answer}${it.after}</div>
          <div class="tag">${it.exception ? "исключение — просто запомнить" : ""}</div>
        </div>
      </div>
    </div>
    <div class="flash-rate">
      <button class="know" id="know-${idx}">Знаю ✓</button>
      <button class="review" id="review-${idx}">Повторю ↻</button>
    </div>
    <div class="flash-controls">
      <button class="btn btn-ghost" id="flashprev-${idx}">← Карточка назад</button>
      <div class="flash-counter">${st.pos+1} / ${items.length}</div>
      <button class="btn btn-ghost" id="flashnext-${idx}">Карточка вперёд →</button>
    </div>
    <div class="flash-summary">Оценено: ${ratedCount} / ${items.length} · знаю: ${knownCount}</div>`;

  document.getElementById("flashcard-"+idx).addEventListener("click", ()=>{
    document.getElementById("flashinner-"+idx).classList.toggle("flipped");
  });
  document.getElementById("know-"+idx).addEventListener("click", (e)=>{
    e.stopPropagation();
    st.ratings[st.pos] = "know";
    advanceFlash(idx, items, section);
  });
  document.getElementById("review-"+idx).addEventListener("click", (e)=>{
    e.stopPropagation();
    st.ratings[st.pos] = "review";
    advanceFlash(idx, items, section);
  });
  document.getElementById("flashprev-"+idx).addEventListener("click", ()=>{
    st.pos = Math.max(0, st.pos-1);
    drawFlashcard(idx, items, section);
  });
  document.getElementById("flashnext-"+idx).addEventListener("click", ()=>{
    st.pos = Math.min(items.length-1, st.pos+1);
    drawFlashcard(idx, items, section);
  });
}

function advanceFlash(idx, items, section){
  const st = flashState[idx];
  const known = Object.values(st.ratings).filter(r=>r==="know").length;
  slideScores[idx] = {correct: known, total: items.length, section};
  if(st.pos < items.length-1){
    st.pos++;
  }
  drawFlashcard(idx, items, section);
}

/* ============================= QUIZ ============================= */

const quizState = {};

function renderQuiz(idx, items, section){
  quizState[idx] = {q:0, score:0, answered:false};
  drawQuiz(idx, items, section);
}

function drawQuiz(idx, items, section){
  const st = quizState[idx];
  const wrap = document.getElementById("quizwrap-"+idx);
  if(st.q >= items.length){
    const percent = Math.round((st.score/items.length)*100);
    wrap.innerHTML = `<div class="quiz-card"><p class="quiz-final">Викторина завершена: ${st.score} / ${items.length} (${percent}%)</p></div>`;
    slideScores[idx] = {correct: st.score, total: items.length, section};
    return;
  }
  const it = items[st.q];
  wrap.innerHTML = `
    <div class="quiz-progress">Вопрос ${st.q+1} из ${items.length}</div>
    <div class="quiz-card">
      <p class="q-prompt">${it.prompt}</p>
      <div class="quiz-options">
        ${it.options.map((o,oi)=>`<button class="quiz-option" id="qopt-${idx}-${oi}">${o}</button>`).join("")}
      </div>
      <div class="quiz-next" id="quiznext-${idx}" style="display:none;">
        <button class="btn btn-primary" id="quiznextbtn-${idx}">Следующий вопрос →</button>
      </div>
    </div>`;
  st.answered = false;
  it.options.forEach((o,oi)=>{
    document.getElementById(`qopt-${idx}-${oi}`).addEventListener("click", ()=>{
      if(st.answered) return;
      st.answered = true;
      it.options.forEach((o2,oi2)=>{
        const b = document.getElementById(`qopt-${idx}-${oi2}`);
        b.disabled = true;
        if(o2 === it.answer) b.classList.add("correct");
        else if(oi2 === oi) b.classList.add("wrong");
      });
      if(o === it.answer) st.score++;
      document.getElementById("quiznext-"+idx).style.display = "block";
    });
  });
  document.getElementById("quiznextbtn-"+idx).addEventListener("click", ()=>{
    st.q++;
    drawQuiz(idx, items, section);
  });
}

/* ============================= EGE ROWS ============================= */

const egeState = {};

function renderEgeRows(idx, data){
  egeState[idx] = null;
  const container = document.getElementById("ege-"+idx);
  container.innerHTML = "";
  data.rows.forEach((row,ri)=>{
    const div = document.createElement("div");
    div.className = "ege-row";
    div.id = "egerow-"+idx+"-"+ri;
    const wordsHtml = row.map(w => w.before + "<span class='blank'>__</span>" + w.after).join(",&nbsp;&nbsp;");
    div.innerHTML = `<span class="ege-row-num">${ri+1}</span><span class="ege-row-words">${wordsHtml}</span>`;
    div.addEventListener("click", ()=>{
      if(container.classList.contains("locked")) return;
      container.querySelectorAll(".ege-row").forEach(r=>r.classList.remove("selected"));
      div.classList.add("selected");
      egeState[idx] = ri;
    });
    container.appendChild(div);
  });
}

function checkEgeRows(idx, data, section){
  const container = document.getElementById("ege-"+idx);
  container.classList.add("locked");
  const chosen = egeState[idx];
  const correct = chosen === data.correctRowIndex;
  document.getElementById("egerow-"+idx+"-"+data.correctRowIndex).classList.add("correct");
  if(!correct && chosen !== null && chosen !== undefined){
    document.getElementById("egerow-"+idx+"-"+chosen).classList.add("wrong");
  }
  const letter = data.rows[data.correctRowIndex][0].answer;
  document.getElementById("result-"+idx).textContent = correct
    ? ("Верно! Буква «"+letter+"».")
    : ("Правильная строка — №"+(data.correctRowIndex+1)+", буква «"+letter+"».");
  slideScores[idx] = {correct: correct?1:0, total:1, section};
}

/* ============================= ФИНАЛЬНЫЙ СЛАЙД ============================= */

let gaugeIdCounter = 0;

function waterGaugeSVG(percent, color, label, valueText){
  gaugeIdCounter++;
  const id = "gaugeclip-"+gaugeIdCounter;
  const r = 66, cx = 75, cy = 75;
  const waterTop = cy + r - (percent/100) * (2*r);
  return `
    <div class="gauge">
      <svg viewBox="0 0 150 150" style="filter:drop-shadow(0 0 16px ${color}55);">
        <defs><clipPath id="${id}"><circle cx="${cx}" cy="${cy}" r="${r}"></circle></clipPath></defs>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.18)" stroke-width="2"></circle>
        <g clip-path="url(#${id})">
          <rect x="-20" y="${waterTop}" width="190" height="160" fill="${color}" opacity="0.85"></rect>
          <path d="M-20,${waterTop} Q 17.5,${waterTop-7} 55,${waterTop} T 130,${waterTop} T 205,${waterTop} T 280,${waterTop} V160 H-20 Z" fill="${color}" opacity="0.5">
            <animateTransform attributeName="transform" type="translate" from="0 0" to="-150 0" dur="5s" repeatCount="indefinite"/>
          </path>
          <path d="M-20,${waterTop} Q 17.5,${waterTop+6} 55,${waterTop} T 130,${waterTop} T 205,${waterTop} T 280,${waterTop} V160 H-20 Z" fill="${color}" opacity="0.35">
            <animateTransform attributeName="transform" type="translate" from="-150 0" to="0 0" dur="7s" repeatCount="indefinite"/>
          </path>
          ${percent > 8 ? `
          <circle cx="55" cy="${cy+30}" r="2.5" fill="rgba(255,255,255,.6)">
            <animate attributeName="cy" from="${cy+40}" to="${waterTop+4}" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;.7;0" dur="3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="90" cy="${cy+20}" r="1.8" fill="rgba(255,255,255,.6)">
            <animate attributeName="cy" from="${cy+35}" to="${waterTop+4}" dur="4s" begin="1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;.6;0" dur="4s" begin="1s" repeatCount="indefinite"/>
          </circle>` : ``}
        </g>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"></circle>
        <text x="75" y="82" text-anchor="middle" font-family="PT Serif, serif" font-size="26" fill="#EAF6FB">${valueText}</text>
      </svg>
      <div class="gauge-label">${label}</div>
    </div>`;
}

function renderFinal(el){
  const totalSlides = SLIDES.length;
  const progressPercent = Math.round(((maxReached+1)/totalSlides)*100);

  const bySection = {};
  Object.values(slideScores).forEach(sc=>{
    if(!bySection[sc.section]) bySection[sc.section] = {correct:0,total:0};
    bySection[sc.section].correct += sc.correct;
    bySection[sc.section].total += sc.total;
  });

  let totalCorrect = 0, totalAnswered = 0;
  Object.values(bySection).forEach(v=>{ totalCorrect+=v.correct; totalAnswered+=v.total; });
  const understandingPercent = totalAnswered > 0 ? Math.round((totalCorrect/totalAnswered)*100) : null;

  const weakSections = Object.keys(bySection).filter(k=>{
    const v = bySection[k];
    return v.total > 0 && (v.correct/v.total) < 0.7;
  });

  let homeworkList = "";
  if(weakSections.length > 0){
    homeworkList += weakSections.map(k=>{
      const v = bySection[k];
      const pct = Math.round((v.correct/v.total)*100);
      return `<li class="weak">Повторить раздел «${k}» — результат на занятии ${pct}%</li>`;
    }).join("");
  } else if(totalAnswered > 0){
    homeworkList += `<li>Все пройденные разделы закреплены хорошо — можно переходить к следующей теме.</li>`;
  } else {
    homeworkList += `<li>Практика ещё не пройдена — вернитесь к упражнениям, прежде чем оценивать прогресс.</li>`;
  }

  el.innerHTML = `
    <div class="eyebrow">Итоги занятия</div>
    <h1>Как прошло знакомство с заданием 9</h1>
    <p class="subtitle">Ниже — сколько материала пройдено за урок и насколько уверенно усвоены правила по результатам всех форматов практики: слов, сортировки, флеш-карт, викторины и заданий в формате ЕГЭ.</p>
    <div class="gauges">
      ${waterGaugeSVG(progressPercent, "#4FD1C5", "Пройдено материала", progressPercent+"%")}
      ${understandingPercent === null
        ? waterGaugeSVG(0, "#3d5c6b", "Понимание темы", "—")
        : waterGaugeSVG(understandingPercent, understandingPercent>=70 ? "#3DDC97" : "#FF6F61", "Понимание темы", understandingPercent+"%")}
    </div>
    <div class="homework">
      <h3>Заметки для домашней работы</h3>
      <ul>${homeworkList}</ul>
      <p class="static-note">Дополнительно: свериться со словарём корней от ФИПИ (83 корня из методички) и разделом «Словарь-шпаргалка», выучить наизусть список слов-исключений (выгарки, отрасль, росток, ростовщик, скачок, утварь, полог, равнина, ровесник, поровну, сочетание и др.) — они не подчиняются общим правилам и запоминаются только списком. Флеш-карты из этого урока можно пройти ещё раз, начиная с карточек, отмеченных «Повторю».</p>
    </div>`;
}

/* ============================= НАВИГАЦИЯ ============================= */

function goTo(idx){
  if(idx === currentIndex) return;
  currentIndex = Math.max(0, Math.min(SLIDES.length-1, idx));
  maxReached = Math.max(maxReached, currentIndex);
  playTransitionRipple();
  render(currentIndex);
  updateNav();
}

function updateNav(){
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === SLIDES.length-1;
  slideCounter.textContent = (currentIndex+1) + " / " + SLIDES.length;
  progressFill.style.width = Math.round(((currentIndex+1)/SLIDES.length)*100) + "%";
  viewport.scrollTop = 0;
}

prevBtn.addEventListener("click", ()=>goTo(currentIndex-1));
nextBtn.addEventListener("click", ()=>goTo(currentIndex+1));
document.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowRight") goTo(currentIndex+1);
  if(e.key === "ArrowLeft") goTo(currentIndex-1);
});

/* ============================= ВОДНАЯ РЯБЬ ПРИ ПЕРЕХОДЕ ============================= */
function playTransitionRipple(){
  const r = document.getElementById("transitionRipple");
  if(!r) return;
  r.classList.remove("play");
  void r.offsetWidth;
  r.classList.add("play");
}

/* ============================= ВСПЛЕСК КАПЕЛЬ (выбор буквы) ============================= */
function dropletBurst(el){
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const count = 6;
  for(let i=0;i<count;i++){
    const angle = (i/count) * Math.PI*2 + Math.random()*0.4;
    const dist = 22 + Math.random()*14;
    const d = document.createElement("div");
    d.className = "droplet";
    d.style.left = cx+"px";
    d.style.top = cy+"px";
    d.style.setProperty("--dx", (Math.cos(angle)*dist)+"px");
    d.style.setProperty("--dy", (Math.sin(angle)*dist)+"px");
    d.style.background = "var(--aqua)";
    document.body.appendChild(d);
    d.addEventListener("animationend", ()=>d.remove());
  }
}

/* ============================= РЯБЬ ПРИ НАЖАТИИ НА ЛЮБУЮ КНОПКУ ============================= */
document.addEventListener("click", function(e){
  const target = e.target.closest("button, .ege-row, .sort-bucket");
  if(!target) return;
  const rect = target.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const span = document.createElement("span");
  span.className = "ripple-circle";
  span.style.width = span.style.height = size+"px";
  span.style.left = (e.clientX - rect.left - size/2)+"px";
  span.style.top = (e.clientY - rect.top - size/2)+"px";
  const prevPosition = getComputedStyle(target).position;
  if(prevPosition === "static") target.style.position = "relative";
  const prevOverflow = getComputedStyle(target).overflow;
  if(prevOverflow === "visible") target.style.overflow = "hidden";
  target.appendChild(span);
  span.addEventListener("animationend", ()=>span.remove());
});

/* ============================= ПУЗЫРЬКИ ============================= */
(function makeBubbles(){
  const wrap = document.getElementById("bubbles");
  if(!wrap) return;
  const count = 18;
  for(let i=0;i<count;i++){
    const b = document.createElement("i");
    const size = 4 + Math.random()*16;
    b.style.width = size+"px";
    b.style.height = size+"px";
    b.style.left = (Math.random()*100)+"%";
    b.style.animationDuration = (8 + Math.random()*12)+"s";
    b.style.animationDelay = (Math.random()*10)+"s";
    wrap.appendChild(b);
  }
})();

goTo(0);
</script>
